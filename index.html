<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>Nura Health — Precision Longevity Medicine</title>
    <meta name="description" content="Nura Health bridges biological research and advanced digital medicine to map, track, and optimize your cellular longevity trajectory." />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <body class="bg-cream text-charcoal font-sans antialiased selection:bg-clay selection:text-cream overflow-x-hidden">
    <!-- Global CSS Noise Overlay -->
    <svg class="pointer-events-none fixed inset-0 z-[9999] opacity-[0.05] select-none mix-blend-overlay" width="100%" height="100%">
      <filter id="noiseFilter">
        <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch" />
      </filter>
      <rect width="100%" height="100%" filter="url(#noiseFilter)" />
    </svg>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
